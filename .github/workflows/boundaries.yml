# Mechanical boundary enforcement — runs OUTSIDE the agent, on every PR.
#
# This is layer 2 of enforcement. On its own it only REPORTS. It becomes a
# wall when you mark the "boundaries" check as REQUIRED in branch protection
# and forbid direct pushes to main — see ../../BRANCH_PROTECTION.md.
#
# Trimmed to this repo's stack: TypeScript only (adapter: dependency-cruiser).

name: boundaries

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this job only needs to read the code. The agent/CI token
# must NOT be able to administer the repo or dismiss this check.
permissions:
  contents: read

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BoundaryGuard dependency
        run: pip install pyyaml

      # --- TypeScript / JavaScript (this repo's only stack) ----------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies (dependency-cruiser comes from the lockfile)
        run: npm ci

      - name: Enforce boundaries
        run: python bigbrainBoundaryGuard/check_boundaries.py check
