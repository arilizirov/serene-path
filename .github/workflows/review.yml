# LLM critic — advisory PR review (NOT a blocking gate).
#
# Posts the reviewer's findings as a PR comment to strengthen the human
# reviewer. It does NOT set a required check: an LLM can be wrong or gamed, so
# a human still makes the call. Add the ANTHROPIC_API_KEY repo secret to enable.

name: ai-review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # to post the review comment

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip cleanly if no key is configured, so the workflow never hard-fails.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "no ANTHROPIC_API_KEY secret; skipping AI review"
            exit 0
          fi
          git diff origin/${{ github.base_ref }}...HEAD \
            | python bigbrainReviewer/review.py > review.md || true
          echo "had_review=true" >> "$GITHUB_OUTPUT"
      - name: Post review comment
        if: steps.review.outputs.had_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review.md')) return;
            const body = "🤖 **bigbrain reviewer (advisory — a human makes the call)**\n\n"
              + fs.readFileSync('review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
